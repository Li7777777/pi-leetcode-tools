name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        node:
          - 22.19.0
          - 24
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install the locked workspace
        run: npm ci
      - name: Verify release workflow policy and static boundaries
        run: npm run verify:tools:release-workflow
      - name: Provision the fixed upstream references
        run: npm run provision:tools:upstream
      - name: Verify the exact Tools release artifact
        run: npm run verify:tools:release
      - name: Audit production dependencies
        run: npm audit --omit=dev
      - name: Retain tarball, SBOM, and release evidence
        if: ${{ always() && hashFiles('.artifacts/tools/pi-leetcode-tools-release-evidence.json') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tools-release-evidence-${{ matrix.os }}-node-${{ matrix.node }}
          path: |
            .artifacts/tools/*.tgz
            .artifacts/tools/pi-leetcode-tools-sbom.cdx.json
            .artifacts/tools/pi-leetcode-tools-pi-activation-evidence.json
            .artifacts/tools/pi-leetcode-tools-release-evidence.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
