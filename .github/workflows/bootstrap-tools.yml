name: bootstrap-tools-next-once

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact pi-leetcode-tools semantic version committed at the selected tag
        required: true
        type: string
      expected_sha256:
        description: Exact lowercase SHA-256 of the committed CandidateRecord tgz
        required: true
        type: string
      expected_record_digest:
        description: Exact sha256-prefixed digest from committed current.json
        required: true
        type: string
      expected_npm_owner:
        description: npm account that owns the short-lived granular bootstrap token
        required: true
        type: string
      confirmation:
        description: Type "bootstrap pi-leetcode-tools@VERSION to next"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: bootstrap-pi-leetcode-tools-once
  cancel-in-progress: false

env:
  RELEASE_VERSION: ${{ inputs.version }}
  RELEASE_EXPECTED_SHA256: ${{ inputs.expected_sha256 }}
  RELEASE_EXPECTED_RECORD_DIGEST: ${{ inputs.expected_record_digest }}
  RELEASE_EXPECTED_NPM_OWNER: ${{ inputs.expected_npm_owner }}
  RELEASE_CONFIRMATION: ${{ inputs.confirmation }}

jobs:
  validate:
    name: Validate tagged exact tgz without credentials
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: read
    steps:
      - name: Check out complete tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up fixed Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install the locked workspace
        run: npm ci
      - name: Verify regular release boundaries remain fail-closed
        run: npm run verify:tools:release-workflow
      - name: Provision fixed upstream references
        run: npm run provision:tools:upstream
      - name: Rebuild and verify the committed candidate without recording
        run: npm run verify:tools:release:no-record
      - name: Verify independent upstream adapter fixtures
        run: npm run verify:tools:upstream-adapter-fixtures
      - name: Reverify the committed CandidateRecord
        run: npm run verify:tools:candidate
      - name: Prepare exact one-time bootstrap bundle
        run: >-
          node release/scripts/verify-tools-bootstrap-registry.mjs prepare
          --version "$RELEASE_VERSION"
          --expected-sha256 "$RELEASE_EXPECTED_SHA256"
          --expected-record-digest "$RELEASE_EXPECTED_RECORD_DIGEST"
          --expected-owner "$RELEASE_EXPECTED_NPM_OWNER"
          --confirmation "$RELEASE_CONFIRMATION"
          --artifacts .artifacts/tools
          --bundle .artifacts/bootstrap-bundle/tools
      - name: Exercise exact npm publish without changing the registry
        run: >-
          npm publish ".artifacts/bootstrap-bundle/tools/pi-leetcode-tools-${RELEASE_VERSION}.tgz"
          --dry-run
          --tag next
          --access public
          --ignore-scripts
      - name: Upload exact approved bootstrap bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tools-bootstrap-bundle-${{ github.run_id }}
          path: .artifacts/bootstrap-bundle/tools/**
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Protected one-time npm bootstrap
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-tools-bootstrap
    permissions:
      id-token: write
    steps:
      - name: Set up fixed provenance runtime
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 24.18.0
      - name: Download exact approved bootstrap bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: tools-bootstrap-bundle-${{ github.run_id }}
          path: bootstrap-bundle
      - name: Verify bundle and publish its one exact tgz to next
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import { createHash } from "node:crypto";
          import { lstat, readFile, readdir } from "node:fs/promises";
          import { join, resolve } from "node:path";

          const fail = (message) => { throw new Error(message); };
          const assert = (condition, message) => { if (!condition) fail(message); };
          const sha256 = (bytes) => createHash("sha256").update(bytes).digest("hex");
          const integrity = (bytes) => `sha512-${createHash("sha512").update(bytes).digest("base64")}`;
          const digest = (value) => `sha256:${sha256(JSON.stringify(value))}`;
          const version = process.env.RELEASE_VERSION;
          const expectedSha = (process.env.RELEASE_EXPECTED_SHA256 ?? "").replace(/^sha256:/u, "");
          const expectedRecordDigest = process.env.RELEASE_EXPECTED_RECORD_DIGEST;
          const expectedOwner = process.env.RELEASE_EXPECTED_NPM_OWNER;
          const expectedTag = `pi-leetcode-tools-v${version}`;
          const tarballName = `pi-leetcode-tools-${version}.tgz`;
          const directory = resolve("bootstrap-bundle");
          const allowed = new Set([
            "approval.json",
            "current.json",
            "policy.json",
            "pre-publish-dist-tags.json",
            "record.json",
            tarballName
          ]);
          const entries = await readdir(directory);
          assert(entries.length === allowed.size && entries.every((entry) => allowed.has(entry)), "Bootstrap bundle allowlist mismatch");
          for (const entry of entries) {
            const metadata = await lstat(join(directory, entry));
            assert(metadata.isFile() && !metadata.isSymbolicLink(), `Unsafe bootstrap bundle entry: ${entry}`);
          }

          const [approval, current, snapshot, recordBytes, tarball] = await Promise.all([
            readFile(join(directory, "approval.json"), "utf8").then(JSON.parse),
            readFile(join(directory, "current.json"), "utf8").then(JSON.parse),
            readFile(join(directory, "pre-publish-dist-tags.json"), "utf8").then(JSON.parse),
            readFile(join(directory, "record.json")),
            readFile(join(directory, tarballName))
          ]);
          const record = JSON.parse(recordBytes.toString("utf8"));
          assert(/^[0-9a-f]{64}$/u.test(expectedSha), "Expected tgz SHA-256 is invalid");
          assert(/^sha256:[0-9a-f]{64}$/u.test(expectedRecordDigest ?? ""), "Expected CandidateRecord digest is invalid");
          assert(typeof process.env.NPM_TOKEN === "string" && process.env.NPM_TOKEN.length > 0, "Protected environment NPM_TOKEN is missing");
          assert(process.env.GITHUB_EVENT_NAME === "workflow_dispatch", "Bootstrap publish must be manually dispatched");
          assert(process.env.GITHUB_REF_TYPE === "tag" && process.env.GITHUB_REF_NAME === expectedTag, `Bootstrap publish requires ${expectedTag}`);
          assert(process.env.RELEASE_CONFIRMATION === `bootstrap pi-leetcode-tools@${version} to next`, "Bootstrap confirmation is invalid");
          assert(approval.evidenceType === "one-time-npm-bootstrap-approval", "Bootstrap approval has the wrong type");
          assert(approval.source?.commit === process.env.GITHUB_SHA && approval.source?.tag === expectedTag, "Bootstrap approval is not bound to this tag and commit");
          assert(approval.source?.workflow === ".github/workflows/bootstrap-tools.yml", "Bootstrap approval names the wrong workflow");
          assert(approval.subject?.package === "pi-leetcode-tools" && approval.subject?.version === version, "Bootstrap approval has the wrong package identity");
          assert(approval.subject?.tarball === tarballName && approval.subject?.bytes === tarball.length, "Bootstrap approval has the wrong tgz identity");
          assert(approval.subject?.sha256 === `sha256:${expectedSha}` && sha256(tarball) === expectedSha, "Bootstrap tgz differs from the approved SHA-256");
          assert(approval.subject?.integrity === integrity(tarball), "Bootstrap tgz integrity differs from the approval");
          assert(approval.subject?.recordDigest === expectedRecordDigest, "Bootstrap approval has the wrong CandidateRecord digest");
          assert(current.recordId === record.recordId && current.recordDigest === expectedRecordDigest, "Bootstrap CandidateRecord pointer is inconsistent");
          assert(`sha256:${sha256(recordBytes)}` === expectedRecordDigest, "Bootstrap CandidateRecord byte digest is invalid");
          assert(record.artifact?.file === tarballName && record.artifact?.sha256 === `sha256:${expectedSha}`, "Bootstrap CandidateRecord names different tgz bytes");
          assert(record.artifact?.bytes === tarball.length && record.artifact?.distIntegrity === integrity(tarball), "Bootstrap CandidateRecord tgz metadata is invalid");
          assert(approval.registry?.origin === "https://registry.npmjs.org" && approval.registry?.expectedOwner === expectedOwner, "Bootstrap registry approval is invalid");
          assert(approval.registry?.publishDistTag === "next" && approval.registry?.protectedDistTag === "latest", "Bootstrap dist-tag approval is invalid");
          assert(approval.registry?.packageAbsent === true, "Bootstrap approval did not prove package absence");
          assert(snapshot.state?.packageExists === false && Object.keys(snapshot.state?.distTags ?? {}).length === 0, "Bootstrap pre-publish snapshot was not empty");
          assert(snapshot.stateDigest === digest(snapshot.state) && approval.registry.prePublishStateDigest === snapshot.stateDigest, "Bootstrap pre-publish snapshot digest is invalid");

          const response = await fetch("https://registry.npmjs.org/pi-leetcode-tools", {
            headers: { accept: "application/vnd.npm.install-v1+json" },
            redirect: "error"
          });
          assert(response.status === 404, `pi-leetcode-tools now exists (HTTP ${response.status}); refusing non-bootstrap publication`);
          NODE

          npm_version="$(npm --version)"
          node - "$npm_version" <<'NODE'
          const [major, minor] = process.argv[2].split(".").map(Number);
          if (!Number.isInteger(major) || !Number.isInteger(minor) || major < 11 || (major === 11 && minor < 5)) {
            throw new Error(`npm >=11.5 is required for provenance; found ${process.argv[2]}`);
          }
          NODE

          isolated_home="$RUNNER_TEMP/pi-leetcode-tools-bootstrap-home"
          isolated_userconfig="$RUNNER_TEMP/pi-leetcode-tools-bootstrap-user.npmrc"
          isolated_globalconfig="$RUNNER_TEMP/pi-leetcode-tools-bootstrap-global.npmrc"
          isolated_cache="$RUNNER_TEMP/pi-leetcode-tools-bootstrap-cache"
          trap 'rm -rf "$isolated_home" "$isolated_userconfig" "$isolated_globalconfig" "$isolated_cache"' EXIT
          mkdir -p "$isolated_home" "$isolated_cache"
          printf '%s\n' \
            'registry=https://registry.npmjs.org/' \
            '//registry.npmjs.org/:_authToken=${NPM_TOKEN}' \
            'audit=false' \
            'fund=false' \
            'update-notifier=false' > "$isolated_userconfig"
          : > "$isolated_globalconfig"
          chmod 600 "$isolated_userconfig" "$isolated_globalconfig"

          HOME="$isolated_home" \
          NPM_CONFIG_USERCONFIG="$isolated_userconfig" \
          NPM_CONFIG_GLOBALCONFIG="$isolated_globalconfig" \
          NPM_CONFIG_CACHE="$isolated_cache" \
          npm publish "bootstrap-bundle/pi-leetcode-tools-${RELEASE_VERSION}.tgz" \
            --registry https://registry.npmjs.org/ \
            --tag next \
            --provenance \
            --access public \
            --ignore-scripts

  verify:
    name: Verify registry without npm or OIDC credentials
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: read
    steps:
      - name: Check out complete tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up fixed Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 24.18.0
          cache: npm
      - name: Download exact approved bootstrap bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: tools-bootstrap-bundle-${{ github.run_id }}
          path: bootstrap-bundle
      - name: Install locked verification dependencies
        run: npm ci
      - name: Verify exact bytes, integrity, provenance, clean install, Pi activation, and dist-tags
        run: >-
          node release/scripts/verify-tools-bootstrap-registry.mjs verify
          --version "$RELEASE_VERSION"
          --expected-sha256 "$RELEASE_EXPECTED_SHA256"
          --expected-record-digest "$RELEASE_EXPECTED_RECORD_DIGEST"
          --expected-owner "$RELEASE_EXPECTED_NPM_OWNER"
          --bundle bootstrap-bundle
          --artifacts .artifacts/tools
          --evidence ".artifacts/tools/pi-leetcode-tools-${RELEASE_VERSION}-bootstrap-registry-evidence.json"
      - name: Retain bootstrap registry evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tools-bootstrap-registry-${{ github.run_id }}
          path: .artifacts/tools/**
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 90
